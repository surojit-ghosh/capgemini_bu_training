<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Step Form</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --text: #1f2937;
    --muted: #6b7280;
    --line: #e5e7eb;
    --accent: #2563eb;
    --error: #dc2626;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 560px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    overflow: hidden;
  }

  .progress {
    height: 6px;
    background: #f0f1f3;
  }

  .progress .bar {
    height: 100%;
    width: 33.33%;
    background: var(--accent);
  }

  .steps {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    gap: 12px;
  }

  .step {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 14px;
  }

  .step .dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: #f3f4f6;
    color: #6b7280;
    font-weight: 600;
  }

  .step.active {
    color: var(--text);
  }

  .step.active .dot {
    background: var(--accent);
    color: #ffffff;
  }

  .divider {
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .content {
    padding: 20px;
  }

  .section {
    margin-bottom: 20px;
  }

  .section h2 {
    font-size: 18px;
    margin: 0 0 6px;
  }

  .section p {
    margin: 0 0 14px;
    color: var(--muted);
    font-size: 14px;
  }

  form {
    display: grid;
    gap: 12px;
  }

  label {
    font-size: 14px;
    color: var(--muted);
  }

  input,
  select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-size: 14px;
    background: #ffffff;
  }

  input:focus,
  select:focus {
    outline: 2px solid #dbeafe;
    border-color: var(--accent);
  }

  input:invalid {
    border-color: var(--error);
  }

  .row {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .help {
    font-size: 12px;
    color: var(--muted);
  }

  .check-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
    color: var(--muted);
  }

  .check-row input {
    margin-top: 2px;
    width: 16px;
    height: 16px;
  }

  .footer {
    padding: 16px 20px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--line);
  }

  .btn {
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #ffffff;
    font-size: 14px;
    cursor: pointer;
  }

  .btn.primary {
    background: var(--accent);
    color: #ffffff;
    border-color: var(--accent);
  }

  .muted {
    color: var(--muted);
    font-size: 12px;
  }

  @media (max-width: 520px) {
    .row {
      grid-template-columns: 1fr;
    }

    .step span {
      display: none;
    }
  }
</style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="progress">
      <div class="bar"></div>
    </div>

    <div class="steps">
      <div class="step active" data-step="1">
        <div class="dot">1</div>
        <span>Personal</span>
      </div>
      <div class="divider"></div>
      <div class="step" data-step="2">
        <div class="dot">2</div>
        <span>Account</span>
      </div>
      <div class="divider"></div>
      <div class="step" data-step="3">
        <div class="dot">3</div>
        <span>Confirm</span>
      </div>
    </div>

    <div class="content">
      <section class="section" data-step="1">
        <h2>Personal Info</h2>
        <p>Tell us a bit about yourself</p>
        <form>
          <div class="row">
            <div>
              <label for="fname">First name</label>
              <input id="fname" type="text" required>
            </div>
            <div>
              <label for="lname">Last name</label>
              <input id="lname" type="text" required>
            </div>
          </div>
          <div>
            <label for="email">Email address</label>
            <input id="email" type="email" required>
            <div class="help">Use a valid email format.</div>
          </div>
          <div>
            <label for="phone">Phone number (optional)</label>
            <input id="phone" type="tel">
          </div>
        </form>
      </section>

      <section class="section" data-step="2" hidden>
        <h2>Account Setup</h2>
        <p>Create your login credentials</p>
        <form>
          <div>
            <label for="username">Username</label>
            <input id="username" type="text" required>
          </div>
          <div>
            <label for="password">Password</label>
            <input id="password" type="password" required>
          </div>
          <div>
            <label for="role">Role</label>
            <select id="role">
              <option>Viewer</option>
              <option>Editor</option>
              <option>Admin</option>
            </select>
          </div>
        </form>
      </section>

      <section class="section" data-step="3" hidden>
        <h2>Confirmation</h2>
        <p>Review before submitting</p>
        <form>
          <div>
            <label class="check-row">
              <input type="checkbox" required>
              I agree to the Terms of Service and Privacy Policy
            </label>
          </div>
        </form>
      </section>
    </div>

    <div class="footer">
      <button class="btn" type="button" id="backBtn">Back</button>
      <span class="muted" id="stepCounter">Step 1 of 3</span>
      <button class="btn primary" type="button" id="nextBtn">Continue</button>
    </div>
  </div>
</div>

<script>
  const totalSteps = 3;
  let currentStep = 1;

  const sections = Array.from(document.querySelectorAll(".section[data-step]"));
  const steps = Array.from(document.querySelectorAll(".step[data-step]"));
  const progressBar = document.querySelector(".progress .bar");
  const stepCounter = document.getElementById("stepCounter");
  const nextBtn = document.getElementById("nextBtn");
  const backBtn = document.getElementById("backBtn");

  function showStep() {
    sections.forEach((section) => {
      section.hidden = Number(section.dataset.step) !== currentStep;
    });

    steps.forEach((stepEl) => {
      stepEl.classList.toggle("active", Number(stepEl.dataset.step) <= currentStep);
    });

    progressBar.style.width = `${(currentStep / totalSteps) * 100}%`;
    stepCounter.textContent = `Step ${currentStep} of ${totalSteps}`;
    backBtn.style.visibility = currentStep === 1 ? "hidden" : "visible";
    nextBtn.textContent = currentStep === totalSteps ? "Submit" : "Continue";
  }

  nextBtn.addEventListener("click", () => {
    const activeSection = sections.find(
      (section) => Number(section.dataset.step) === currentStep
    );
    const form = activeSection ? activeSection.querySelector("form") : null;
    if (form && !form.reportValidity()) {
      return;
    }
    if (currentStep < totalSteps) {
      currentStep += 1;
      showStep();
      return;
    }
    nextBtn.textContent = "Submitted";
    nextBtn.disabled = true;
  });

  backBtn.addEventListener("click", () => {
    if (currentStep > 1) {
      currentStep -= 1;
      showStep();
    }
  });

  showStep();
</script>
</body>
</html>
