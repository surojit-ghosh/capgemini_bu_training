<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masonry Gallery</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white font-sans p-8">

    <div class="max-w-7xl mx-auto">
        <h2 class="text-2xl font-bold text-gray-900 mb-8">Capgemini Assets</h2>
        
        <div class="columns-1 sm:columns-2 lg:columns-3 gap-6 space-y-6">
            
            <div class="relative group break-inside-avoid overflow-hidden rounded-2xl bg-gray-100">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop" class="w-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Asset">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
                    <h3 class="text-white font-medium text-lg">Abstract Wave</h3>
                    <button class="mt-3 bg-white/20 hover:bg-white/30 backdrop-blur-md text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors w-max">Download</button>
                </div>
            </div>

            <div class="relative group break-inside-avoid overflow-hidden rounded-2xl bg-gray-100">
                <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=600&auto=format&fit=crop" class="w-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Asset">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
                    <h3 class="text-white font-medium text-lg">Tech Setup</h3>
                    <button class="mt-3 bg-white/20 hover:bg-white/30 backdrop-blur-md text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors w-max">Download</button>
                </div>
            </div>

            <div class="relative group break-inside-avoid overflow-hidden rounded-2xl bg-gray-100">
                <img src="https://images.unsplash.com/photo-1604871000636-074fa5117945?q=80&w=600&auto=format&fit=crop" class="w-full object-cover transition-transform duration-700 group-hover:scale-105" alt="Asset">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
                    <h3 class="text-white font-medium text-lg">3D Render</h3>
                    <button class="mt-3 bg-white/20 hover:bg-white/30 backdrop-blur-md text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors w-max">Download</button>
                </div>
            </div>
             </div>
    </div>

</body>
</html>
