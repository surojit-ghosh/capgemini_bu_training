<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Modal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center font-sans">

    <input type="checkbox" id="modal-toggle" class="peer hidden" />
    
    <label for="modal-toggle" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-lg shadow-sm cursor-pointer transition-colors">
        Open Settings
    </label>

    <div class="fixed inset-0 z-50 hidden peer-checked:flex items-center justify-center bg-gray-900/40 backdrop-blur-sm transition-opacity">
        <label for="modal-toggle" class="absolute inset-0 cursor-default"></label>
        
        <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-xl relative z-10 transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-semibold text-gray-900">Workspace Settings</h2>
                <label for="modal-toggle" class="text-gray-400 hover:text-gray-600 cursor-pointer p-1">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </label>
            </div>
            <p class="text-gray-500 text-sm mb-6">Manage your team preferences and billing details here. Changes save automatically.</p>
            <div class="flex justify-end gap-3">
                <label for="modal-toggle" class="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg cursor-pointer transition-colors">Cancel</label>
                <label for="modal-toggle" class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg cursor-pointer transition-colors">Save Changes</label>
            </div>
        </div>
    </div>

</body>
</html>
