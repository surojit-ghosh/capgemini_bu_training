<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Hover UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center font-sans p-8">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto w-full">
        
        <div class="relative group rounded-2xl overflow-hidden bg-gray-800 border border-gray-700 hover:border-indigo-500 shadow-lg hover:shadow-[0_0_40px_rgba(99,102,241,0.4)] transition-all duration-500 cursor-pointer">
            
            <div class="h-80 overflow-hidden relative">
                <img src="https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop" alt="Data" class="w-full h-full object-cover transform transition-transform duration-700 group-hover:scale-110">
                
                <div class="absolute inset-0 bg-gradient-to-t from-gray-950 via-gray-900/60 to-transparent opacity-80 group-hover:opacity-100 transition-opacity duration-500"></div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-6 translate-y-12 group-hover:translate-y-0 transition-transform duration-500 ease-out">
                
                <span class="inline-block px-3 py-1 bg-indigo-500/20 text-indigo-300 text-xs font-semibold rounded-full mb-3 opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-100">Analytics</span>
                
                <h3 class="text-2xl font-bold text-white mb-2">Predictive Models</h3>
                
                <p class="text-gray-400 text-sm opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-150 mb-4 line-clamp-2">
                    Leverage our machine learning infrastructure to forecast trends and automate decision-making across your business.
                </p>
                
                <div class="flex items-center text-indigo-400 font-medium text-sm opacity-0 group-hover:opacity-100 transition-opacity duration-500 delay-200">
                    Explore feature 
                    <svg class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </div>
            </div>
        </div>
        
        </div>

</body>
</html>
