<!DOCTYPE html>
<html lang="en">

<head>
    <title>Capgemini</title>
</head>

<body>
    <form action="#" method="POST">
        <h3>Capgemini Candidate Details</h3>

        <p>
            <label for="name">Enter Name:</label>
            <input type="text" id="name" name="name" required>
        </p>

        <p>
            <label for="college">Enter College Name:</label>
            <input type="text" id="college" name="college" required>
        </p>

        <p>
            <label>Enter Course:</label><br>
            <input type="radio" id="btech" name="course" value="BTech">
            <label for="btech">BTech</label>

            <input type="radio" id="mca" name="course" value="MCA">
            <label for="mca">MCA</label>
        </p>

        <label>Required Documents (Select at least one)</label><br>

        <p s>
            <input type="checkbox" id="doc_resume" name="documents" value="Resume" class="doc-checkbox">
            <label for="doc_resume">Updated Resume / CV</label>
        </p>

        <p s>
            <input type="checkbox" id="doc_marksheet" name="documents" value="Marksheet" class="doc-checkbox">
            <label for="doc_marksheet">Consolidated Marksheet / Transcripts</label>
        </p>

        <p>
            <input type="checkbox" id="doc_id" name="documents" value="GovernmentID" class="doc-checkbox">
            <label for="doc_id">Government Issued ID Proof</label>
        </p>

        <p>
            <label for="username">Enter Username:</label>
            <input type="text" id="username" name="username" required>
        </p>

        <p>
            <label for="password">Enter Password:</label>
            <input type="password" id="password" name="password" required>
        </p>

        <button type="submit">Submit</button>
    </form>
</body>

</html>
