<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FAFAFA] text-gray-900 font-sans antialiased min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-lg bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
<div class="p-6 border-b border-gray-100">
<h1 class="text-sm font-semibold text-gray-900 tracking-tight uppercase tracking-wider text-gray-400">Workspace</h1>
<form id="task-form" class="mt-3 flex gap-2">
<div class="flex-1">
<input type="text" id="task-input" placeholder="Track a new task..." class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-black transition-colors placeholder-gray-400" autocomplete="off">
</div>
<button type="submit" class="px-4 py-2 bg-black hover:bg-gray-800 text-white text-sm font-medium rounded-lg transition-colors focus:outline-none">
Add
</button>
</form>
<p id="error-msg" class="text-red-500 text-xs mt-2 hidden">Please enter a valid task description.</p>
</div>
<ul id="task-list" class="divide-y divide-gray-100 max-h-[50vh] overflow-y-auto">
</ul>
</div>

<script>
let tasks = [];
const form = document.getElementById('task-form');
const input = document.getElementById('task-input');
const list = document.getElementById('task-list');
const errorMsg = document.getElementById('error-msg');

form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = input.value.trim();
    
    if (!text) {
        errorMsg.classList.remove('hidden');
        input.classList.add('border-red-500');
        return;
    }
    
    errorMsg.classList.add('hidden');
    input.classList.remove('border-red-500');
    
    tasks.unshift({ id: Date.now(), text, status: 'todo' });
    input.value = '';
    render();
});

window.updateStatus = (id, newStatus) => {
    tasks = tasks.map(t => t.id === id ? { ...t, status: newStatus } : t);
    render();
};

window.deleteTask = (id) => {
    tasks = tasks.filter(t => t.id !== id);
    render();
};

function render() {
    if (tasks.length === 0) {
        list.innerHTML = '<li class="p-8 text-center text-gray-400 text-sm">No tasks assigned.</li>';
        return;
    }
    
    list.innerHTML = tasks.map(task => {
        let textStyle = 'text-gray-700';
        if (task.status === 'completed') textStyle = 'text-gray-400 line-through';
        if (task.status === 'in-progress') textStyle = 'text-black font-medium';

        return `
            <li class="p-4 flex items-center justify-between gap-4 hover:bg-gray-50 transition-colors">
                <span class="text-sm truncate ${textStyle}">${task.text}</span>
                <div class="flex items-center gap-2 shrink-0">
                    <select onchange="updateStatus(${task.id}, this.value)" class="text-xs font-medium border border-gray-200 rounded-md px-2 py-1 bg-white focus:outline-none focus:border-black text-gray-600 cursor-pointer">
                        <option value="todo" ${task.status === 'todo' ? 'selected' : ''}>To Do</option>
                        <option value="in-progress" ${task.status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                        <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
                    </select>
                    <button onclick="deleteTask(${task.id})" class="p-1 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-md transition-colors focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                    </button>
                </div>
            </li>
        `;
    }).join('');
}

render();
</script>
</body>
</html>
